name: Update Video ID
on:
  schedule:
    - cron: '*/5 * * * *' # Se ejecuta cada 5 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente
  repository_dispatch:
    types: [youtube-update] # Permite ejecutarlo vía webhook

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Obtener el Video ID de YouTube directamente
        run: |
          # ⚠️ REEMPLAZA EL ID DEL CANAL SI ES NECESARIO ⚠️
          CHANNEL_ID="UCdqzXVgmwUi3Bb7iPvYSK5A"

          VIDEO_ID=""

          # --- Método A: Descarga Directa del Feed de YouTube ---
          echo "Intentando descargar feed de YouTube directamente..."
          curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://www.youtube.com/feeds/videos.xml?channel_id=$CHANNEL_ID" > feed.xml
          
          # Extraer el ID del video más reciente (el primero en la lista)
          VIDEO_ID=$(grep -oP "(?<=<yt:videoId>)[^<]+" feed.xml | head -n 1)

          # --- Método B: Fallback vía API de rss2json (IPs de proxy que evitan bloqueos de Google) ---
          if [ -z "$VIDEO_ID" ]; then
            echo "Aviso: El feed directo falló o fue bloqueado por YouTube. Usando fallback vía API rss2json..."
            curl -s -L "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.youtube.com%2Ffeeds%2Fvideos.xml%3Fchannel_id%3D$CHANNEL_ID" > response.json
            
            # Extraer el primer ID de video del JSON retornado
            VIDEO_ID=$(grep -oP '"guid":"yt:video:\K[^"]+' response.json | head -n 1)
          fi

          # --- Validación y Guardado ---
          if [ -n "$VIDEO_ID" ]; then
            echo "{\"videoId\": \"$VIDEO_ID\"}" > video.json
            echo "Video ID obtenido con éxito: $VIDEO_ID"
          else
            echo "Error: No se pudo obtener el Video ID de YouTube usando ningún método."
            echo "--- Contenido del feed.xml directo ---"
            cat feed.xml | head -n 15
            echo "--- Contenido de response.json (si existe) ---"
            [ -f response.json ] && cat response.json | head -n 15
            exit 1
          fi

      - name: Hacer commit y push de los cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Revisar si hay cambios en video.json
          if git diff --exit-code video.json; then
            echo "El Video ID es el mismo. No hay cambios."
          else
            git add video.json
            git commit -m "Actualizando videoId desde YouTube directamente"
            git push
            echo "Nuevos cambios subidos a GitHub."
          fi
