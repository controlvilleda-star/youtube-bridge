name: Update Video ID
on:
  schedule:
    - cron: '*/5 * * * *' # Se ejecuta cada 5 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Obtener el Video ID de YouTube directamente
        run: |
          # ⚠️ REEMPLAZA EL ID DEL CANAL SI ES NECESARIO ⚠️
          CHANNEL_ID="UCdqzXVgmwUi3Bb7iPvYSK5A"

          
          # Descargar el feed RSS oficial de YouTube para el canal
          curl -s "https://www.youtube.com/feeds/videos.xml?channel_id=$CHANNEL_ID" > feed.xml
          
          # Extraer el ID del video más reciente (el primero en la lista)
          VIDEO_ID=$(grep -oP "(?<=<yt:videoId>)[^<]+" feed.xml | head -n 1)
          
          if [ -n "$VIDEO_ID" ]; then
            # Crear o sobreescribir el archivo video.json
            echo "{
  \"videoId\": \"$VIDEO_ID\"
}" > video.json
            echo "Video ID obtenido de YouTube: $VIDEO_ID"
          else
            echo "No se pudo obtener el Video ID desde YouTube."
            exit 1
          fi

      - name: Hacer commit y push de los cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Revisar si hay cambios en video.json
          if git diff --exit-code video.json; then
            echo "El Video ID es el mismo. No hay cambios."
          else
            git add video.json
            git commit -m "Actualizando videoId desde YouTube directamente"
            git push
            echo "Nuevos cambios subidos a GitHub."
          fi
